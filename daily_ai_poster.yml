name: Daily AI Poster Generator & WhatsApp Broadcast

on:
  schedule:
    # Runs daily at 03:30 UTC (09:00 AM IST)
    - cron: '30 3 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  run-ai-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Google Chrome (Headless Browser)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip libxi6 libgconf-2-4 libnss3
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get install -fy

      - name: Install Python ML & Automation Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ai_pipeline/requirements.txt

      - name: Start Local Web Server
        run: |
          python serve.py &
          sleep 3

      - name: Execute Daily AI Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WHATSAPP_GROUP_ID: ${{ secrets.WHATSAPP_GROUP_ID }}
        run: |
          python ai_pipeline/main_scheduler.py

      - name: Archive Generated Poster Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-marketing-poster
          path: ai_pipeline/output/daily_poster.jpg
          retention-days: 7
